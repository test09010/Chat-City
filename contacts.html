<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ChatCity — Contacts</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
#root { display:flex;flex-direction:column;height:100dvh; }
.page-content { flex:1;overflow-y:auto; }
.user-item { display:flex;align-items:center;gap:13px;padding:13px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s; }
.user-item:active { background:var(--bg3); }
.user-av { width:52px;height:52px;border-radius:50%;font-size:18px;flex-shrink:0; }
.user-av img { width:100%;height:100%;object-fit:cover;border-radius:50%; }
.user-body { flex:1;min-width:0; }
.user-name { font-weight:700;font-size:15px;margin-bottom:3px; }
.user-code { font-size:12px;color:var(--text2); }
.add-btn { width:38px;height:38px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
.search-wrap { padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5; }
.search-inp { width:100%;padding:10px 16px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:30px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border .2s; }
.search-inp:focus { border-color:var(--accent); }
.empty { display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px;text-align:center;color:var(--text3); }
.empty-emoji { font-size:60px;margin-bottom:16px;opacity:.5; }
.empty h3 { font-size:18px;font-weight:700;color:var(--text2);margin-bottom:8px; }
.add-friend-modal { display:none; }
</style>
</head>
<body>
<div id="toast"></div>
<div id="root">
  <div class="topbar">
    <div class="topbar-title">Find Users</div>
    <button class="btn btn-primary" style="padding:8px 14px;font-size:13px;" onclick="openAddFriendModal()"><i class="fas fa-user-plus"></i> Add by Code</button>
  </div>

  <div class="page-content">
    <div class="search-wrap">
      <input class="search-inp" type="text" id="search" placeholder="🔍 Search users…" oninput="filterUsers()">
    </div>
    <div id="users-list"></div>
    <div id="empty-state" class="empty hidden">
      <div class="empty-emoji"><i class="fas fa-users" style="opacity:.3;"></i></div>
      <h3>No users found</h3>
      <p>Search or add friends using their code</p>
    </div>
  </div>

  <nav class="bnav">
    <button class="nbtn" onclick="go('home.html')"><span class="ni"><i class="fas fa-comment-dots"></i></span><span class="nl">Chats</span></button>
    <button class="nbtn active" onclick="go('contacts.html')"><span class="ni"><i class="fas fa-users"></i></span><span class="nl">Contacts</span></button>
    <button class="nbtn" onclick="go('profile.html')"><span class="ni"><i class="fas fa-user"></i></span><span class="nl">Profile</span></button>
  </nav>
</div>

<!-- Add Friend Modal -->
<div class="modal-overlay" id="add-friend-modal" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title"><i class="fas fa-user-plus" style="color:var(--accent);"></i> Add by Friend Code</div>
    <input class="inp" type="text" id="friend-code-inp" placeholder="Enter 8-character code" maxlength="8" style="margin-bottom:14px;">
    <button class="btn btn-primary" style="width:100%;" onclick="addByCode()"><i class="fas fa-check"></i> Add Friend</button>
    <div id="add-err" class="errmsg" style="margin-top:8px;"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>

<script type="module">
import {
  auth, db, ref, get, onAuthStateChanged,
  colorFor, initialsOf, generateUserCode, addFriendByCode, searchUsers,
  toast, go, getSession, VERIFIED_BADGE
} from './firebase.js';

let me = null;
let allUsers = [];
window.go = go;

onAuthStateChanged(auth, async user => {
  if (!user) { go('index.html'); return; }
  const sess = getSession();
  if (!sess || sess.uid !== user.uid) { go('index.html'); return; }
  me = user;
  await loadUsers();
});

async function loadUsers() {
  try {
    const snap = await get(ref(db, 'users'));
    allUsers = [];
    snap.forEach(child => {
      if (child.key !== me.uid) {
        allUsers.push({ uid: child.key, ...child.val() });
      }
    });
    renderUsers(allUsers);
  } catch (e) {
    console.error('Load users error:', e);
  }
}

function renderUsers(users) {
  const list = document.getElementById('users-list');
  list.innerHTML = '';
  
  if (!users.length) {
    document.getElementById('empty-state').classList.remove('hidden');
    return;
  }
  document.getElementById('empty-state').classList.add('hidden');

  users.forEach(u => {
    const item = document.createElement('div');
    item.className = 'user-item';
    item.dataset.name = (u.name || '').toLowerCase();

    const avHtml = u.photo
      ? `<img src="${u.photo}" alt="">`
      : `<div class="av user-av" style="background:${u.color || colorFor(u.uid)}">${u.initials || initialsOf(u.name || '?')}</div>`;

    item.innerHTML = `
      <div class="user-av">${avHtml}</div>
      <div class="user-body">
        <div class="user-name">
          ${u.name || 'User'}
          ${u.verified ? `<img src="${VERIFIED_BADGE}" style="width:14px;height:14px;vertical-align:middle;margin-left:3px;">` : ''}
        </div>
        <div class="user-code"><i class="fas fa-hashtag" style="font-size:10px;"></i> ${generateUserCode(u.uid)}</div>
      </div>
      <button class="add-btn" onclick="startChat('${u.uid}', event)"><i class="fas fa-comment"></i></button>`;

    list.appendChild(item);
  });
}

window.filterUsers = () => {
  const q = document.getElementById('search').value.toLowerCase().trim();
  document.querySelectorAll('.user-item').forEach(el => {
    el.style.display = (!q || el.dataset.name.includes(q)) ? '' : 'none';
  });
};

window.startChat = (uid, e) => {
  e.stopPropagation();
  const user = allUsers.find(u => u.uid === uid);
  if (!user) return;
  sessionStorage.setItem('cc_chat_target', JSON.stringify({
    uid: user.uid,
    name: user.name,
    initials: user.initials || initialsOf(user.name || '?'),
    color: user.color || colorFor(user.uid),
    photo: user.photo || ''
  }));
  go('chat.html');
};

window.openAddFriendModal = () => {
  document.getElementById('add-err').textContent = '';
  document.getElementById('friend-code-inp').value = '';
  document.getElementById('add-friend-modal').classList.add('show');
};

window.addByCode = async () => {
  const code = document.getElementById('friend-code-inp').value.trim().toUpperCase();
  const errEl = document.getElementById('add-err');
  errEl.textContent = '';

  if (!code || code.length !== 8) {
    errEl.textContent = 'Enter valid 8-character code';
    return;
  }

  try {
    const user = await addFriendByCode(me.uid, code);
    toast(`Added ${user.name}!`, 'ok');
    document.getElementById('add-friend-modal').classList.remove('show');
    await loadUsers();
  } catch (e) {
    errEl.textContent = '❌ ' + (e.message || 'User not found');
  }
};
</script>
</body>
</html>
